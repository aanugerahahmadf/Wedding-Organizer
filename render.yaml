services:
  - type: web
    name: admin-panel-mobile
    plan: free
    runtime: docker
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_KEY
        generateValue: true
      - key: DB_URL
        sync: false
