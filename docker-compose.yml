services:
  # ============================================================
  # 🚀 APLIKASI WEB (LARAVEL + FILAMENT)
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-panel-app
    restart: unless-stopped
    ports:
      - "8000:80"       # Website Filament: http://localhost:8000/admin
    environment:
      - APP_NAME=WeddingOrganizer
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000

      - DOCKER_ENV=true

      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-admin_panel_cbir}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}

      # Session / Cache / Queue pakai database
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database

      # Broadcast (Reverb) - web
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=local_reverb
      - REVERB_APP_KEY=local_key
      - REVERB_APP_SECRET=local_secret
      - REVERB_HOST=localhost
      - REVERB_PORT=8080
      - REVERB_SCHEME=http

    volumes:
      # JANGAN mount seluruh project (.:/var/www/html) — itu penyebab hang!
      # Vendor sudah di-install di dalam image saat build.
      # Hanya mount folder kode yang perlu hot-reload:
      - ./app:/var/www/html/app
      - ./bootstrap:/var/www/html/bootstrap
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./lang:/var/www/html/lang
      - ./public:/var/www/html/public
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
      - ./storage:/var/www/html/storage
      # Volume terpisah untuk bootstrap/cache agar writable
      - app-cache:/var/www/html/bootstrap/cache
    networks:
      - weeding-network
    depends_on:
      mysql:
        condition: service_healthy

  # ============================================================
  # 🗄️ DATABASE (MYSQL 8.0)
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: admin-panel-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-admin_panel_cbir}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: sail
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3307:3306"   # 3307 agar tidak bentrok MySQL lokal
    volumes:
      - mysql-db-data:/var/lib/mysql
    networks:
      - weeding-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
      retries: 5
      timeout: 5s

  # ============================================================
  # 🔍 PHPMYADMIN
  # ============================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: admin-panel-pma
    restart: unless-stopped
    ports:
      - "8081:80"     # http://localhost:8081
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=${DB_PASSWORD:-password}
    networks:
      - weeding-network
    depends_on:
      - mysql

networks:
  weeding-network:
    driver: bridge

volumes:
  mysql-db-data:
    driver: local
  app-cache:         # bootstrap/cache writable di dalam container
    driver: local
